name: Deploy Status

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        if [ -f "package.json" ]; then
          npm ci
        else
          echo "No package.json found, skipping npm install"
        fi
        
    - name: Run tests (if exists)
      run: |
        if [ -f "package.json" ] && npm run test --silent 2>/dev/null; then
          npm test
        else
          echo "No tests found, skipping tests"
        fi
        
    - name: Build project (if exists)
      run: |
        if [ -f "package.json" ] && npm run build --silent 2>/dev/null; then
          npm run build
        else
          echo "No build script found, skipping build"
        fi
        
    - name: Deploy Status Check
      run: |
        echo "🚀 Deployment Status: SUCCESS"
        echo "📊 Repository: ${{ github.repository }}"
        echo "🌿 Branch: ${{ github.ref_name }}"
        echo "👤 Commit: ${{ github.sha }}"
        echo "⏰ Time: $(date)"
        
    - name: Create deployment status file
      run: |
        echo '{"status": "success", "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'", "branch": "'${{ github.ref_name }}'", "commit": "'${{ github.sha }}'"}' > deployment-status.json
        
    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: deployment-status
        path: deployment-status.json
        retention-days: 30
